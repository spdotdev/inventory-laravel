name: Secret scan

# Supersede an in-flight run when a newer commit lands on the same ref, so
# rapid pushes/PR updates don't stack redundant (and, for the emulator/MySQL
# jobs, expensive) runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Catches accidentally-committed secrets (.env values, API keys, tokens, SSH keys).
# Runs on every push to main + every PR. Cheap, and safe on any content — so it is
# ACTIVE immediately (not dormant), unlike the code-quality workflows.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # gitleaks-action lists a PR's commits via the API on pull_request events.
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the whole diff range is scanned, not just HEAD.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
